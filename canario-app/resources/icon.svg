<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Microphone icon for Canario -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Microphone body -->
  <rect x="44" y="16" width="40" height="60" rx="20" ry="20" fill="url(#grad)" />

  <!-- Microphone grille lines -->
  <line x1="52" y1="32" x2="76" y2="32" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="40" x2="78" y2="40" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="48" x2="78" y2="48" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="56" x2="78" y2="56" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="52" y1="64" x2="76" y2="64" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- Microphone stand -->
  <rect x="60" y="76" width="8" height="20" rx="2" fill="url(#grad)" />

  <!-- Microphone base -->
  <path d="M 40 96 Q 40 88 64 88 Q 88 88 88 96 L 88 100 L 40 100 Z" fill="url(#grad)" />

  <!-- Sound waves (left) -->
  <path d="M 32 40 Q 28 46 32 52" fill="none" stroke="#FFB347" stroke-width="3" stroke-linecap="round"/>
  <path d="M 24 34 Q 18 46 24 58" fill="none" stroke="#FFB347" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Sound waves (right) -->
  <path d="M 96 40 Q 100 46 96 52" fill="none" stroke="#FFB347" stroke-width="3" stroke-linecap="round"/>
  <path d="M 104 34 Q 110 46 104 58" fill="none" stroke="#FFB347" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>
