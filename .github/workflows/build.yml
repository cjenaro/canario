name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build Rust sidecar for all platforms ─────────────────────────────
  build-sidecar:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build sidecar
        run: cargo build --release --bin canario-electron

      - name: Prepare sidecar directory
        run: |
          mkdir -p canario-app/sidecar
          cp target/release/canario-electron canario-app/sidecar/
          chmod +x canario-app/sidecar/canario-electron

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.os }}
          path: canario-app/sidecar/
          retention-days: 1

# ── Build & package Electron app for all platforms ───────────────────
build-electron:
  needs: build-sidecar
  strategy:
    matrix:
      os: [ubuntu-latest, macos-latest, windows-latest]
  runs-on: ${{ matrix.os }}
  steps:
    - uses: actions/checkout@v4

    - name: Download sidecar
      uses: actions/download-artifact@v4
      with:
        name: sidecar-${{ matrix.os }}
        path: canario-app/sidecar/

    - name: Make sidecar executable
      if: runner.os != 'Windows'
      run: chmod +x canario-app/sidecar/canario-electron

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: canario-app/package-lock.json

    - name: Install dependencies
      working-directory: canario-app
      run: npm ci

    - name: Build renderer
      working-directory: canario-app
      run: npm run build

    - name: Package (electron-builder)
      working-directory: canario-app
      run: npx electron-builder --${{ matrix.os }} --publish never
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false

    - name: Upload packaged artifact
      uses: actions/upload-artifact@v4
      with:
        name: canario-${{ matrix.os }}
        path: |
          canario-app/dist/*/*
        retention-days: 30

# ── Create GitHub Release ────────────────────────────────────────────
release:
  if: startsWith(github.ref, 'refs/tags/v')
  needs: build-electron
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: List artifacts
      run: find artifacts/ -type f | sort

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          artifacts/canario-ubuntu-latest/**/*
          artifacts/canario-macos-latest/**/*
          artifacts/canario-windows-latest/**/*
